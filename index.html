<!DOCTYPE html>
<html id="website" lang="en" onkeydown="jump(event)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jump Game</title>

    <style>
        #website {
            background-color: black;
            color: white;
        }

        #score {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
        }

        #character {
            width: 100px;
            height: 100px;
            background-color: red;
            position: absolute;
            top: 500px;
            left: 50px;
            transition: top 250ms ease-out;
        }

        #enemy {
            width: 100px;
            height: 100px;
            background-color: blue;
            position: absolute;
            top: 500px;
            left: 1000px;
        }
    </style>
</head>

<body>
    <div id="score">Punkte: 10</div>
    <div id="character"></div>
    <div id="enemy"></div>

    <script>
        const character = document.getElementById("character");
        const enemy = document.getElementById("enemy");
        const scoreDiv = document.getElementById("score");

        let enemy_left = 1000;
        let on_ground = true;
        let points = 10;
        let hitCooldown = false;

        setInterval(() => {
            enemy.style.left = enemy_left + "px";
            enemy_left -= 25;

            if (enemy_left < -100) {
                enemy_left = 1000;
                hitCooldown = false;
            }

            checkCollision();
        }, 20);

        function jump(event) {
            if (event.code !== "Space") return;
            if (!on_ground) return;

            character.style.top = "250px";
            on_ground = false;

            setTimeout(() => {
                character.style.top = "500px";
            }, 400);

            setTimeout(() => {
                on_ground = true;
            }, 100);
        }

        function checkCollision() {
            const charRect = character.getBoundingClientRect();
            const enemyRect = enemy.getBoundingClientRect();

            const collision =
                charRect.right > enemyRect.left &&
                charRect.left < enemyRect.right &&
                charRect.bottom > enemyRect.top &&
                charRect.top < enemyRect.bottom;

            if (collision && !hitCooldown) {
                points--;
                scoreDiv.textContent = "Punkte: " + points;
                hitCooldown = true;

                if (points <= 0) {
                    alert("Game Over");
                    location.reload();
                }
            }
        }
    </script>
</body>
</html>
